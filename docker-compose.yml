version: "2"

services:
    db:
        image: mysql
        command: --default-authentication-plugin=mysql_native_password
        restart: always
        environment:
            DB_HOSTNAME: db
            MYSQL_ROOT_PASSWORD: password
            MYSQL_DATABASE: playerum
        volumes:
            - ./database/data:/var/lib/mysql
            - ./database/sql:/docker-entrypoint-initdb.d
        ports:
            - 3300:3306
    app:
        build: .
        command: npm start
        ports:
            - "3001:3001"
        volumes:
            - .:/usr/app
        depends_on:
            - db 

            